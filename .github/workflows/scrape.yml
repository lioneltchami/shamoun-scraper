name: Scrape and Ingest Content

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-scraper.txt

      - name: Install Python dependencies
        run: pip install -r requirements-scraper.txt

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Scrape Sam Shamoun articles
        run: python scrape_shamoun.py --incremental 2>/dev/null || python scrape_shamoun.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Scrape Max Shimba blog articles
        run: python scripts/scrape_shimba_blog.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Scrape YouTube channel metadata
        run: python scripts/scrape_shimba_youtube.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Detect content changes
        id: check
        run: |
          git add articles/ data/ articles_metadata.json failed_downloads.log
          if git diff --staged --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        if: steps.check.outputs.has_changes == 'true'
        run: npm ci

      - name: Commit scraped content
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: scrape new content [$(date -u +%Y-%m-%d)]"
          git pull --rebase origin main
          git push

      - name: Ingest articles into Supabase
        if: steps.check.outputs.has_changes == 'true'
        run: npm run db:ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Validate Supabase content
        if: steps.check.outputs.has_changes == 'true'
        run: npm run db:validate
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Audit local vs Supabase content contract
        if: steps.check.outputs.has_changes == 'true'
        run: npm run db:audit-contract
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
